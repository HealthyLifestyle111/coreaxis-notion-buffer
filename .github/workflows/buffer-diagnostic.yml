name: Buffer Diagnostic
on:
  push:
    branches:
      - main
    paths:
      - 'scripts/diagnose-buffer.mjs'
      - '.github/workflows/buffer-diagnostic.yml'
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Inspect Buffer channel and launch post
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
        run: node scripts/diagnose-buffer.mjs
