name: Notion Native Social Sync
on:
  push:
    branches: [main]
    paths:
      - 'scripts/notion-native-social-sync.mjs'
      - '.github/workflows/notion-native-social-sync.yml'
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: notion-native-social-sync
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - run: npm ci
      - run: node scripts/notion-native-social-sync.mjs
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: '2fc38cda2cba491cb090d4f09d0ec1d2'
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_IG_USER_ID: ${{ secrets.META_IG_USER_ID }}
          META_GRAPH_VERSION: ${{ vars.META_GRAPH_VERSION }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          LINKEDIN_VERSION: ${{ vars.LINKEDIN_VERSION }}
# Launch verification trigger: 2026-07-19
