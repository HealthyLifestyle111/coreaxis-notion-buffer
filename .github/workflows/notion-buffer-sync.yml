name: Notion Buffer Sync
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - run: npm ci
      - run: node scripts/notion-buffer-sync.mjs
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: '2fc38cda-2cba-491c-b090-d4f09d0ec1d2'
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
