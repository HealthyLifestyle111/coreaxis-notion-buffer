name: Notion Buffer Sync
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      with: ref: main 
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: node scripts/notion-buffer-sync.mjs
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID || '252649c1-4370-4cbc-9f08-7c708f0d970c' }}
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
