name: Notion Buffer Sync

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Notion to Buffer sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
        run: node scripts/notion-buffer-sync.mjs
