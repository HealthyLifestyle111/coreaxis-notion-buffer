name: Notion Buffer Sync
on:
  push:
    branches:
      - main
    paths:
      - 'scripts/notion-buffer-sync.mjs'
      - '.github/workflows/notion-buffer-sync.yml'
      - 'package.json'
      - 'package-lock.json'
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
concurrency:
  group: notion-buffer-sync
  cancel-in-progress: false
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - run: npm ci
      - run: node scripts/notion-buffer-sync.mjs
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: '252649c1-4370-4cbc-9f08-7c708f0d970c'
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
