name: Notion Publishing Gate + Buffer Sync
on:
  push:
    branches:
      - main
    paths:
      - 'scripts/validate-publishing-records.mjs'
      - 'scripts/notion-buffer-sync.mjs'
      - '.github/workflows/notion-buffer-sync.yml'
      - 'package.json'
      - 'package-lock.json'
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: notion-buffer-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - run: npm ci
      - name: Validate every active publishing record
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: '2fc38cda2cba491cb090d4f09d0ec1d2'
        run: node scripts/validate-publishing-records.mjs
      - name: Publish validated Buffer routes
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: '2fc38cda2cba491cb090d4f09d0ec1d2'
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
        run: node scripts/notion-buffer-sync.mjs

